      token_params:
        grant_type: authorization_code
      refresh_params:
        grant_type: refresh_token
      default_scopes:
        - "bot"
        - "messages.read"
        - "webhook.incoming"
      scope_separator: " "
      pkce: false
      token_expires_in_seconds: 604800
      refresh_margin_minutes: 60
    credentials:
      bot_token:
        type: string
        title: Bot Token (Advanced)
        description: "Use a Bot Token if you prefer not to use OAuth"
        secret: true
        required: false
        doc_url: "https://discord.com/developers/docs/topics/oauth2"
    api:
      base_url: "https://discord.com/api/v10"

  calendly:
