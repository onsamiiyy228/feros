      token_url: "https://api.hubapi.com/oauth/v3/token"
      authorization_params:
        response_type: code
      token_params:
        grant_type: authorization_code
      refresh_params:
        grant_type: refresh_token
      default_scopes:
        - "contacts"
        - "crm.objects.contacts.read"
        - "crm.objects.contacts.write"
      scope_separator: " "
      pkce: false
      token_expires_in_seconds: 1800
      refresh_margin_minutes: 5
    api:
      base_url: "https://api.hubapi.com"

  gohighlevel:
    display_name: GoHighLevel
    description: "Read or update contacts, opportunities, notes, and conversations in GoHighLevel. Use when user mentions GoHighLevel, HighLevel, CRM follow-up, or sub-account contacts."
    categories:
      - crm
      - communication
    icon: users
    auth:
      type: oauth2
      authorization_url: "https://marketplace.gohighlevel.com/oauth/chooselocation"
      token_url: "https://services.leadconnectorhq.com/oauth/token"
      authorization_params:
        response_type: code
      token_params:
        grant_type: authorization_code
        user_type: Location
      refresh_params:
        grant_type: refresh_token
        user_type: Location
      default_scopes:
        - "contacts.readonly"
        - "contacts.write"
        - "opportunities.readonly"
        - "opportunities.write"
        - "conversations/message.readonly"
      scope_separator: " "
      pkce: false
      token_expires_in_seconds: 86400
      refresh_margin_minutes: 10
    connection_config:
      location_id:
        type: string
        title: Location ID
        description: "GoHighLevel sub-account/location ID. Needed for most CRM actions and should match the location where the app was installed."
        example: "HjiMUOsCCHCjtxzEf8PR"
        required: false
      company_id:
        type: string
        title: Company ID
        description: "Agency/company ID. Useful when an agency-level install must be converted to a location token."
        example: "GNb7aIv4rQFVb9iwNl5K"
        required: false
    api:
      base_url: "https://services.leadconnectorhq.com"
      headers:
        Version: "2021-07-28"

  discord:
    display_name: Discord
    description: "Send messages to Discord channels or DMs. Use when user mentions Discord, gaming communities, or team chat on Discord."
    categories:
