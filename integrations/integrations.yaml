    credentials:
      api_key:
        type: string
        title: API Key
        description: "Your Brevo v3 API key"
        secret: true
        required: true
        doc_url: "https://account.brevo.com/advanced/api"
    api:
      base_url: "https://api.brevo.com/v3"
