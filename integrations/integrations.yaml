      - productivity
    icon: calendar
    auth:
      type: oauth2
      authorization_url: "https://accounts.google.com/o/oauth2/v2/auth"
      token_url: "https://oauth2.googleapis.com/token"
      authorization_params:
        response_type: code
        access_type: offline
        prompt: consent
      token_params:
        grant_type: authorization_code
      refresh_params:
        grant_type: refresh_token
      default_scopes:
        - "https://www.googleapis.com/auth/calendar"
      scope_separator: " "
      pkce: true
      token_expires_in_seconds: 3600
      refresh_margin_minutes: 5
    credentials:
      access_token:
        type: string
        title: Service Account Token (Advanced)
        description: "Only needed if using a service account instead of OAuth"
        secret: true
        required: false
        doc_url: "https://developers.google.com/calendar/api/quickstart/python"
    connection_config:
      calendar_id:
        type: string
        title: Calendar ID
        description: "Your calendar ID (usually your email). Leave blank to use 'primary'."
        example: "primary"
        required: false
    api:
      base_url: "https://www.googleapis.com/calendar/v3"
      headers:
        authorization: "Bearer ${credentials.access_token}"

  custom_webhook:
    display_name: Custom Webhook
    description: "Call any custom HTTPS endpoint. Use when user mentions a webhook, custom API, or an integration not listed above."
    categories:
      - custom
    icon: webhook
    auth:
      type: api_key
    credentials:
      api_key:
        type: string
        title: API Key / Bearer Token
        description: "Leave empty if the endpoint requires no authentication"
        secret: true
        required: false
    connection_config:
      header_name:
        type: string
        title: Auth Header Name
        description: "Header to send the key in. Default: Authorization (as 'Bearer <key>')"
        example: "Authorization"
        required: false

  hubspot:
    display_name: HubSpot
    description: "Read or update CRM contacts, deals, companies, and tickets in HubSpot. Use when user mentions HubSpot, CRM, leads, or sales pipeline."
