# Integration Registry — definitions and credential schemas for external services.
#
# Consumed by:
#   - Rust integrations crate (registry.rs) — parsed via serde_yaml
#   - Python integrations.py — serves to frontend + Builder Agent
#   - Frontend credential forms — field labels, types, placeholders
#   - Builder Agent — two-level loading (summary in prompt, detail on demand)
#   - OAuth engine — authorize/token URLs, scopes, PKCE config
#   - Token refresh service — refresh grant type, margin

integrations:
  airtable:
    display_name: Airtable
    description: "Save or retrieve records from Airtable bases. Use when user mentions Airtable, spreadsheets, databases, or record-keeping."
    categories:
      - database
    icon: table
    auth:
      type: oauth2
      client_auth_method: header
      authorization_url: "https://airtable.com/oauth2/v1/authorize"
      token_url: "https://airtable.com/oauth2/v1/token"
      authorization_params:
        response_type: code
      token_params:
        grant_type: authorization_code
      refresh_params:
        grant_type: refresh_token
      default_scopes:
        - "data.records:read"
        - "data.records:write"
        - "schema.bases:read"
      scope_separator: " "
      pkce: true
      token_expires_in_seconds: 7200
      refresh_margin_minutes: 10
    credentials:
      api_token:
        type: string
        title: Personal Access Token (Advanced)
        description: "Only needed if using a PAT instead of OAuth"
        secret: true
        required: false
        doc_url: "https://support.airtable.com/docs/creating-personal-access-tokens"
    connection_config:
      base_id:
        type: string
        title: Base ID
        description: "Found in your Airtable URL: airtable.com/{base_id}/..."
        example: "appXXXXXXXXXXXXXX"
    api:
      base_url: "https://api.airtable.com/v0"
      headers:
        authorization: "Bearer ${credentials.api_token}"

  google_sheets:
    display_name: Google Sheets
    description: "Read from or append rows to Google Sheets. Use when user mentions Google Sheets, spreadsheets, or logging data to sheets."
    categories:
      - database
    icon: sheet
    auth:
      type: oauth2
      authorization_url: "https://accounts.google.com/o/oauth2/v2/auth"
      token_url: "https://oauth2.googleapis.com/token"
      authorization_params:
        response_type: code
        access_type: offline
        prompt: consent
      token_params:
        grant_type: authorization_code
      refresh_params:
        grant_type: refresh_token
      default_scopes:
        - "https://www.googleapis.com/auth/spreadsheets"
      scope_separator: " "
      pkce: true
      token_expires_in_seconds: 3600
      refresh_margin_minutes: 5
    credentials:
      api_key:
        type: string
        title: Google API Key (Advanced)
        description: "Only needed if using an API key instead of OAuth"
        secret: true
        required: false
        doc_url: "https://developers.google.com/sheets/api/quickstart/python"
    connection_config:
      spreadsheet_id:
        type: string
        title: Spreadsheet ID
        description: "Found in your Google Sheets URL between /d/ and /edit"
        example: "1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms"
    api:
      base_url: "https://sheets.googleapis.com/v4"
      headers:
        authorization: "Bearer ${credentials.api_key}"

  slack:
    display_name: Slack
    description: "Send messages or notifications to Slack channels. Use when user mentions Slack, notifications, alerts, or team messages."
    categories:
      - messaging
    icon: message-circle
    auth:
      type: oauth2
      authorization_url: "https://slack.com/oauth/v2/authorize"
      token_url: "https://slack.com/api/oauth.v2.access"
      authorization_params:
        response_type: code
      token_params:
        grant_type: authorization_code
      default_scopes:
        - "chat:write"
        - "channels:read"
      scope_separator: ","
      pkce: false
    credentials:
      bot_token:
        type: string
        title: Bot User OAuth Token (Advanced)
        description: "Only needed if using a bot token instead of OAuth"
        secret: true
        required: false
        doc_url: "https://api.slack.com/tutorials/tracks/getting-a-token"
    connection_config:
      default_channel:
        type: string
        title: Default Channel ID
        description: "Right-click a channel → View details → scroll to the bottom for the ID"
        example: "C01ABCDEF23"
        required: false
    api:
      base_url: "https://slack.com/api"
      headers:
        authorization: "Bearer ${credentials.bot_token}"

  google_calendar:
    display_name: Google Calendar
    description: "Create events, check availability, or list appointments on Google Calendar. Use when user mentions calendar, appointments, scheduling, or booking."
    categories:
