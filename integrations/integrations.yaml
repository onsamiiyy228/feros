  # ── Email / Marketing ────────────────────────────────────────────

  sendgrid:
    display_name: SendGrid
    description: "Send transactional or marketing emails via SendGrid. Use when user mentions SendGrid, email delivery, or transactional email."
    categories:
      - marketing
      - communication
    icon: mail
    auth:
      type: api_key
    credentials:
      api_key:
        type: string
        title: API Key
        description: "Your SendGrid API key — starts with SG."
        secret: true
        required: true
        doc_url: "https://app.sendgrid.com/settings/api_keys"
    api:
      base_url: "https://api.sendgrid.com/v3"
      headers:
        authorization: "Bearer ${credentials.api_key}"

  brevo:
