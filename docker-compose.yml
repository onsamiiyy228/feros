# ==============================================================================
# ⚠️ WARNING: FOR LOCAL DEVELOPMENT ONLY ⚠️
# This docker-compose file is optimized for local development experience.
# It contains hardcoded fallback secrets, missing resource limits, and runs
# containers as root.
#
# DO NOT USE THIS FILE FOR PRODUCTION DEPLOYMENTS.
# ==============================================================================
name: feros-voice-agent-os

services:
  # PostgreSQL Database
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: voice-agent-os
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ferosdev}
      POSTGRES_DB: ${POSTGRES_DB:-voice_agent}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voice-agent-os -d $${POSTGRES_DB:-voice_agent}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Python Backend (FastAPI)
  studio-api:
    build:
      context: .
      dockerfile: studio/api/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE__URL: ${DATABASE__URL:-postgresql://voice-agent-os:${POSTGRES_PASSWORD:-ferosdev}@db:5432/${POSTGRES_DB:-voice_agent}}
      AUTH__SECRET_KEY: ${AUTH__SECRET_KEY:-n4tdUP80bCKerLNVf7eHMjTnlpatHcz1SFcKfBuvl1s=}
      ENVIRONMENT: development
    volumes:
      - ./studio/api:/workspace/studio/api
      - ./voice/engine:/workspace/voice/engine
      - ./integrations:/workspace/integrations
      - recordings:/recordings
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s  # give maturin/uv time to compile voice-engine on first run
    command: >
      sh -c "uv run --no-sync alembic upgrade head &&
             uv run --no-sync python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-exclude .venv"

  # Rust Voice Server (telephony gateway + WebRTC)
  voice-server:
    build:
      context: .
      dockerfile: voice/server/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    ports:
      - "127.0.0.1:8300:8300"
      - "127.0.0.1:50000:50000/udp"
    environment:
      DATABASE__URL: ${DATABASE__URL:-postgresql://voice-agent-os:${POSTGRES_PASSWORD:-ferosdev}@db:5432/${POSTGRES_DB:-voice_agent}}
      AUTH__SECRET_KEY: ${AUTH__SECRET_KEY:-n4tdUP80bCKerLNVf7eHMjTnlpatHcz1SFcKfBuvl1s=}
      SERVER__LISTEN_HOST: 0.0.0.0
      SERVER__LISTEN_PORT: 8300
      WEBRTC_UDP_PORT: 50000
      WEBRTC_PUBLIC_IP: 127.0.0.1
      RUST_LOG: voice_server=debug,voice_engine=info,agent_kit=info,voice_transport=info
      # Write recordings to /recordings (shared with studio-api container via named volume).
      # The Python studio-api serves them at /api/recordings/{filename}.
      RECORDING__OUTPUT_URI: "file:///recordings"
      ALLOWED_ORIGINS: "http://localhost:3000"
    volumes:
      - recordings:/recordings
    depends_on:
      db:
        condition: service_healthy
      studio-api:
        condition: service_healthy

  # Next.js Frontend
  studio-web:
    build:
      context: .
      dockerfile: studio/web/Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL: http://studio-api:8000
      WATCHPACK_POLLING: "true"
    volumes:
      - ./studio/web:/app
      - /app/node_modules
      - studio_web_next:/app/.next
      - studio_web_pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      - studio-api
    command: >
      sh -c "pnpm install --frozen-lockfile &&
             pnpm dev"

volumes:
  pgdata:
  recordings:
  studio_web_next:
  studio_web_pnpm_store:
